<!DOCTYPE html>
<html>

    <title>Test Height</title>
</head>
<body>
    <script>
        fetch('index.php').then(r => r.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            document.body.innerHTML = "Done";
        });
    </script>
